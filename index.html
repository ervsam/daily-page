<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily · ervsml</title>
  <style>
    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --text: #1c1c1e;
      --muted: #8e8e93;
      --faint: #c7c7cc;
      --accent: #5a8a6a;
      --border: #e5e5ea;
      --done-text: #aeaeb2;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1c1c1e;
        --text: #f0efec;
        --muted: #636366;
        --faint: #3a3a3c;
        --accent: #6aaa7a;
        --border: #2c2c2e;
        --done-text: #48484a;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 64px 28px 96px;
    }

    .date-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* Progress bar */
    .progress-wrap {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.4s ease;
    }

    /* Todo list */
    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .todo-item:first-child { border-top: 1px solid var(--border); }

    .check-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--faint);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .todo-item.done .check-circle {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-icon { display: none; }
    .todo-item.done .check-icon { display: block; }

    .todo-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.4;
      transition: color 0.15s;
    }

    .todo-item.done .todo-text {
      color: var(--done-text);
      text-decoration: line-through;
      text-decoration-color: var(--done-text);
    }

    .btn-del {
      opacity: 0;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
      transition: opacity 0.12s;
      flex-shrink: 0;
    }

    .todo-item:hover .btn-del,
    .habit-row:hover .btn-del { opacity: 1; }

    /* Add row */
    .add-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }

    .add-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px dashed var(--faint);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--faint);
      font-size: 15px;
      line-height: 1;
    }

    .add-input {
      flex: 1;
      border: none;
      background: none;
      font-size: 16px;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }

    .add-input::placeholder { color: var(--faint); }

    /* Separator */
    .sep {
      height: 1px;
      background: var(--border);
      margin: 56px 0;
    }

    /* Habits */
    .habit-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }

    .habit-row:first-of-type { border-top: 1px solid var(--border); }
    .habit-row .btn-del { font-size: 18px; }

    .check-square {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--faint);
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .check-square.done {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-square .check-icon { display: none; }
    .check-square.done .check-icon { display: block; }

    .habit-name {
      font-size: 14px;
      flex: 1;
      min-width: 60px;
    }

    .habit-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
    }

    .dot.done { background: var(--accent); }

    .streak-count {
      font-size: 12px;
      color: var(--muted);
      width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .streak-count.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* Date navigation */
    .date-nav {
      display: grid;
      grid-template-columns: 40px 1fr 40px;
      align-items: center;
      margin-bottom: 56px;
    }

    .date-nav .date-label {
      margin-bottom: 0;
      cursor: pointer;
      text-align: center;
    }
    .date-nav .date-label:hover { color: var(--text); }

    .nav-btn {
      background: none;
      border: none;
      color: var(--faint);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      transition: color 0.15s;
      user-select: none;
    }
    .nav-btn:hover { color: var(--muted); }
    .nav-btn:disabled { opacity: 0; pointer-events: none; }
    #btn-prev { justify-self: start; }
    #btn-next { justify-self: end; }

    .past-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      text-align: center;
      margin-bottom: 20px;
      margin-top: -40px;
    }

    /* Pomodoro */
    .pomo {
      position: fixed;
      right: 52px;
      top: 48px;
      text-align: center;
      width: 100px;
    }

    @media (max-width: 960px) { .pomo { display: none; } }

    .pomo-mode {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .pomo-time {
      font-size: 32px;
      font-weight: 300;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      line-height: 1;
      margin-bottom: 18px;
    }

    .pomo-time.running { color: var(--accent); }

    .pomo-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 18px;
    }

    .pomo-btn {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--muted);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      line-height: 1;
    }

    .pomo-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pomo-btn.primary { border-color: var(--text); color: var(--text); }
    .pomo-btn.primary:hover { border-color: var(--accent); color: var(--accent); }

    .pomo-dots {
      display: flex;
      gap: 5px;
      justify-content: center;
    }

    .pomo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }

    .pomo-dot.done { background: var(--accent); }

    .pomo-settings-btn {
      background: none;
      border: none;
      color: var(--faint);
      cursor: pointer;
      font-size: 11px;
      margin-top: 16px;
      padding: 2px;
      transition: color 0.15s;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .pomo-settings-btn:hover { color: var(--muted); }

    .pomo-settings {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      display: none;
    }

    .pomo-setting-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 12px;
    }

    .pomo-setting-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .pomo-setting-val {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .pomo-setting-val input {
      width: 36px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      text-align: center;
      outline: none;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      padding: 2px 0;
    }

    /* Projects */
    .projects-trigger {
      position: fixed;
      top: 52px;
      left: 52px;
      background: none;
      border: none;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    .projects-trigger:hover { color: var(--text); }
    @media (max-width: 960px) { .projects-trigger { display: none; } }

    .projects-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .projects-backdrop.open { opacity: 1; pointer-events: all; }

    .projects-panel {
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
    }
    .projects-panel.open { transform: translateX(0); }

    .projects-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .projects-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .projects-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
    }
    .projects-close:hover { color: var(--text); }

    .projects-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .project-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 24px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .project-item:first-child { border-top: 1px solid var(--border); }

    .project-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid var(--faint);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .project-item.done .project-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .project-item.done .check-icon { display: block; }

    .project-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      transition: color 0.15s;
    }
    .project-item.done .project-text {
      color: var(--done-text);
      text-decoration: line-through;
      text-decoration-color: var(--done-text);
    }

    .project-item .btn-del { font-size: 18px; }
    .project-item:hover .btn-del { opacity: 1; }

    .projects-add {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .projects-add input {
      flex: 1;
      border: none;
      background: none;
      font-size: 14px;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }
    .projects-add input::placeholder { color: var(--faint); }

    /* Projects preview (main page) */
    .projects-preview-label { cursor: pointer; }
    .projects-preview-label:hover { color: var(--text); }

    .project-preview-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      opacity: 0.65;
      transition: opacity 0.15s;
      line-height: 1.4;
    }
    .project-preview-item:first-of-type { border-top: 1px solid var(--border); }
    .project-preview-item:hover { opacity: 1; }
    .project-preview-item.done {
      text-decoration: line-through;
      opacity: 0.3;
    }

    /* Daily why */
    .daily-why {
      text-align: center;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.5;
    }

    /* Sync indicator */
    .sync-dot {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .sync-dot.synced  { background: var(--accent); opacity: 0.4; }
    .sync-dot.saving  { background: var(--faint); animation: blink 1s infinite; }
    .sync-dot.error   { background: #e05252; opacity: 0.8; }
    @keyframes blink { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
  </style>
</head>
<body>

<div class="sync-dot saving" id="sync-dot"></div>

<button class="projects-trigger" id="projects-trigger">Projects</button>
<div class="projects-backdrop" id="projects-backdrop"></div>
<div class="projects-panel" id="projects-panel">
  <div class="projects-header">
    <span class="projects-title">Projects</span>
    <button class="projects-close" id="projects-close">×</button>
  </div>
  <div class="projects-list" id="projects-list"></div>
  <div class="projects-add">
    <div class="add-icon">+</div>
    <input type="text" id="projects-input" placeholder="Add a project…" autocomplete="off" />
  </div>
</div>

<div class="pomo" id="pomo">
  <div class="pomo-mode" id="pomo-mode">Focus</div>
  <div class="pomo-time" id="pomo-time">25:00</div>
  <div class="pomo-controls">
    <button class="pomo-btn primary" id="pomo-toggle">▶</button>
    <button class="pomo-btn" id="pomo-reset">↺</button>
  </div>
  <div class="pomo-dots" id="pomo-dots"></div>
  <button class="pomo-settings-btn" id="pomo-settings-btn" title="Edit durations">⚙</button>
  <div class="pomo-settings" id="pomo-settings">
    <div class="pomo-setting-row">
      <span class="pomo-setting-label">Focus</span>
      <div class="pomo-setting-val"><input type="number" id="set-focus" value="25" min="1" max="120"> min</div>
    </div>
    <div class="pomo-setting-row">
      <span class="pomo-setting-label">Short Break</span>
      <div class="pomo-setting-val"><input type="number" id="set-short" value="5" min="1" max="60"> min</div>
    </div>
    <div class="pomo-setting-row" style="margin-bottom:0">
      <span class="pomo-setting-label">Long Break</span>
      <div class="pomo-setting-val"><input type="number" id="set-long" value="15" min="1" max="60"> min</div>
    </div>
  </div>
</div>
<div class="page">
  <p class="daily-why" id="daily-why"></p>
  <div class="date-nav">
    <button class="nav-btn" id="btn-prev">‹</button>
    <div class="date-label" id="date-label" title="Go to today"></div>
    <button class="nav-btn" id="btn-next">›</button>
  </div>

  <div id="todos-section">
    <div class="past-badge" id="past-badge" style="display:none">viewing past</div>
    <div class="section-label" id="todos-label">Today</div>
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <ul class="todo-list" id="todo-list"></ul>
    <div class="add-row" id="add-row">
      <div class="add-icon">+</div>
      <input class="add-input" id="add-input" type="text" placeholder="Add a task…" autocomplete="off" />
    </div>
  </div>

  <div class="sep" id="sep" style="display:none"></div>
  <div id="habits-section"></div>
  <div id="projects-preview"></div>
</div>

<script>
const STORE_KEY = 'daily-v1';
const BIN_ID    = '69f4cb4936566621a8139b36';
const API_KEY   = '$2a$10$rC9h5aCfZpw8uTK74VBwWO52r5ELWEXauUOsHkltH/ICJs5gbxWeO';
const BIN_URL   = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ── Date helpers ──────────────────────────────────────────────────

function dateStr(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() - (offsetDays || 0));
  return [
    d.getFullYear(),
    String(d.getMonth() + 1).padStart(2, '0'),
    String(d.getDate()).padStart(2, '0')
  ].join('-');
}

function shiftDate(ds, delta) {
  const [y, m, d] = ds.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  date.setDate(date.getDate() + delta);
  return [
    date.getFullYear(),
    String(date.getMonth() + 1).padStart(2, '0'),
    String(date.getDate()).padStart(2, '0')
  ].join('-');
}

const TODAY = dateStr(0);
let viewDate = TODAY;

function formatLabel(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return `${DAYS[date.getDay()]}, ${MONTHS[date.getMonth()]} ${d}`;
}

// ── Sync indicator ────────────────────────────────────────────────

function syncStatus(s) {
  const el = document.getElementById('sync-dot');
  if (el) el.className = `sync-dot ${s}`;
}

// ── JSONBin API ───────────────────────────────────────────────────

async function binFetch() {
  const res = await fetch(`${BIN_URL}/latest`, {
    headers: { 'X-Access-Key': API_KEY }
  });
  if (!res.ok) throw new Error(res.status);
  const data = await res.json();
  return data.record || {};
}

async function binSave(s) {
  const res = await fetch(BIN_URL, {
    method: 'PUT',
    headers: { 'X-Access-Key': API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(s)
  });
  if (!res.ok) throw new Error(res.status);
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  syncStatus('saving');
  saveTimer = setTimeout(async () => {
    try { await binSave(state); syncStatus('synced'); }
    catch (e) { console.error('Save failed:', e); syncStatus('error'); }
  }, 600);
}

// ── State ─────────────────────────────────────────────────────────

const DEFAULTS = { todos: {}, habitLog: {}, habits: ['Exercise', 'Read', 'Meditate'], deletedIds: [], projects: [] };
const state = { ...DEFAULTS, deletedIds: [] };

function absorb(incoming) {
  for (const key of Object.keys(state)) delete state[key];
  Object.assign(state, { ...DEFAULTS, ...incoming });
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  scheduleSave();
}

// ── Carryover ─────────────────────────────────────────────────────

function carryOver() {
  if (!state.todos[TODAY]) state.todos[TODAY] = [];
  const todayIds = new Set(state.todos[TODAY].map(t => t.id));
  const deleted  = new Set(state.deletedIds || []);

  // Find most recent past day that has todos
  for (let i = 1; i <= 30; i++) {
    const d = dateStr(i);
    const past = state.todos[d];
    if (!past || past.length === 0) continue;

    const unfinished = past.filter(t => !t.done && !todayIds.has(t.id) && !deleted.has(t.id));
    if (unfinished.length > 0) {
      state.todos[TODAY].push(...unfinished.map(t => ({ ...t, done: false })));
      save();
    }
    break;
  }
}

// ── Habit helpers ─────────────────────────────────────────────────

function calcStreak(habit) {
  const startOffset = state.habitLog[TODAY]?.[habit] ? 0 : 1;
  let s = 0;
  for (let i = startOffset; ; i++) {
    if (state.habitLog[dateStr(i)]?.[habit]) s++;
    else break;
  }
  return s;
}

// ── Rendering ─────────────────────────────────────────────────────

const CHECK_SVG = `<svg class="check-icon" width="10" height="8" viewBox="0 0 10 8" fill="none">
  <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function render() {
  const isPast = viewDate < TODAY;

  // Date label + nav
  document.getElementById('date-label').textContent = formatLabel(viewDate);
  document.getElementById('btn-prev').disabled = false;
  document.getElementById('btn-next').disabled = viewDate >= TODAY;
  document.getElementById('past-badge').style.display = isPast ? 'block' : 'none';

  // Todos
  const todos     = state.todos[viewDate] || [];
  const doneCount = todos.filter(t => t.done).length;
  const total     = todos.length;

  document.getElementById('todos-label').textContent =
    total > 0 ? `${isPast ? '' : 'Today · '}${isPast ? doneCount + '/' + total : doneCount + '/' + total}` : (isPast ? '' : 'Today');

  // Simplify: always show "N/total" when there are todos, "Today" when empty and on today
  document.getElementById('todos-label').textContent =
    total > 0 ? `${isPast ? formatLabel(viewDate).split(',')[0] : 'Today'} · ${doneCount}/${total}`
              : (isPast ? '' : 'Today');

  const progressWrap = document.getElementById('progress-wrap');
  if (total > 0) {
    progressWrap.style.display = 'block';
    document.getElementById('progress-bar').style.width =
      `${Math.round((doneCount / total) * 100)}%`;
  } else {
    progressWrap.style.display = 'none';
  }

  const list = document.getElementById('todo-list');
  list.innerHTML = todos.map(t => `
    <li class="todo-item${t.done ? ' done' : ''}" data-id="${esc(t.id)}">
      <div class="check-circle">${CHECK_SVG}</div>
      <span class="todo-text">${esc(t.text)}</span>
      ${!isPast ? `<button class="btn-del" title="Remove" tabindex="-1">×</button>` : ''}
    </li>
  `).join('');

  list.querySelectorAll('.todo-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.btn-del')) return;
      const t = (state.todos[viewDate] || []).find(x => x.id === el.dataset.id);
      if (t) { t.done = !t.done; save(); render(); }
    });
    el.querySelector('.btn-del')?.addEventListener('click', () => {
      const id = el.dataset.id;
      state.todos[viewDate] = (state.todos[viewDate] || []).filter(x => x.id !== id);
      if (!state.deletedIds.includes(id)) state.deletedIds.push(id);
      save(); render();
    });
  });

  // Show add-row only for today
  document.getElementById('add-row').style.display = isPast ? 'none' : 'flex';

  // Habits (always show today's habits regardless of viewDate)
  const habitsEl = document.getElementById('habits-section');
  const sep      = document.getElementById('sep');

  if (!state.habits.length) {
    habitsEl.innerHTML = '';
    sep.style.display = 'none';
    return;
  }

  sep.style.display = 'block';
  const HISTORY_DAYS = 10;

  habitsEl.innerHTML = `
    <div class="section-label">Habits</div>
    ${state.habits.map(h => {
      const todayDone = state.habitLog[TODAY]?.[h] || false;
      const s = calcStreak(h);
      const dots = Array.from({ length: HISTORY_DAYS }, (_, i) => {
        const d = dateStr(HISTORY_DAYS - i);
        return `<div class="dot${state.habitLog[d]?.[h] ? ' done' : ''}"></div>`;
      }).join('');
      return `
        <div class="habit-row" data-habit="${esc(h)}">
          <div class="check-square${todayDone ? ' done' : ''}" data-habit="${esc(h)}">${CHECK_SVG}</div>
          <span class="habit-name">${esc(h)}</span>
          <div class="habit-dots">${dots}</div>
          <div class="streak-count${s > 0 ? ' active' : ''}">${s > 0 ? s + 'd' : ''}</div>
          <button class="btn-del" title="Remove habit" tabindex="-1">×</button>
        </div>
      `;
    }).join('')}
    <div class="add-row">
      <div class="add-icon">+</div>
      <input class="add-input" id="add-habit-input" type="text" placeholder="Add a habit…" autocomplete="off" />
    </div>
  `;

  habitsEl.querySelectorAll('.check-square').forEach(el => {
    el.addEventListener('click', () => {
      const h = el.dataset.habit;
      if (!state.habitLog[TODAY]) state.habitLog[TODAY] = {};
      state.habitLog[TODAY][h] = !state.habitLog[TODAY][h];
      save(); render();
    });
  });

  habitsEl.querySelectorAll('.habit-row .btn-del').forEach(el => {
    el.addEventListener('click', () => {
      const h = el.closest('.habit-row').dataset.habit;
      state.habits = state.habits.filter(x => x !== h);
      save(); render();
    });
  });

  document.getElementById('add-habit-input').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = e.target.value.trim();
    if (!val || state.habits.includes(val)) return;
    state.habits.push(val);
    save(); render();
    // re-focus the new input after render
    document.getElementById('add-habit-input').focus();
  });
}

// ── Navigation ────────────────────────────────────────────────────

document.getElementById('btn-prev').addEventListener('click', () => {
  viewDate = shiftDate(viewDate, -1);
  render();
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (viewDate < TODAY) { viewDate = shiftDate(viewDate, 1); render(); }
});

document.getElementById('date-label').addEventListener('click', () => {
  if (viewDate !== TODAY) { viewDate = TODAY; render(); }
});

// ── Init ──────────────────────────────────────────────────────────

(async () => {
  try {
    const cached = localStorage.getItem(STORE_KEY);
    if (cached) absorb(JSON.parse(cached));
  } catch (_) {}
  render();
  renderWhy();
  renderProjects();
  renderProjectsPreview();

  try {
    const remote = await binFetch();
    const isValid = Array.isArray(remote.habits) || remote.todos;
    if (isValid) {
      absorb(remote);
    } else {
      await binSave(state);
    }
    carryOver();
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    render();
    renderWhy();
    renderProjects();
    renderProjectsPreview();
    syncStatus('synced');
  } catch (e) {
    console.warn('JSONBin fetch failed, using local cache:', e);
    carryOver();
    render();
    renderWhy();
    renderProjects();
    renderProjectsPreview();
    syncStatus('error');
  }
})();

// ── Pomodoro ──────────────────────────────────────────────────────

const POMO = {
  durations: { focus: 25 * 60, short: 5 * 60, long: 15 * 60 },
  mode: 'focus',
  remaining: 25 * 60,   // seconds left when paused / at rest
  running: false,
  sessions: 0,
  interval: null,
  startedAt: null,      // Date.now() when current run started
  startRemaining: 0     // POMO.remaining value at that moment
};

function pomoFmt(secs) {
  return `${String(Math.floor(secs / 60)).padStart(2, '0')}:${String(secs % 60).padStart(2, '0')}`;
}

function pomoCalcRemaining() {
  if (!POMO.running) return POMO.remaining;
  const elapsed = (Date.now() - POMO.startedAt) / 1000;
  return Math.max(0, POMO.startRemaining - elapsed);
}

function pomoRender() {
  const labels = { focus: 'Focus', short: 'Short Break', long: 'Long Break' };
  document.getElementById('pomo-mode').textContent = labels[POMO.mode];
  const timeEl = document.getElementById('pomo-time');
  timeEl.textContent = pomoFmt(Math.ceil(pomoCalcRemaining()));
  timeEl.className = 'pomo-time' + (POMO.running ? ' running' : '');
  document.getElementById('pomo-toggle').textContent = POMO.running ? '▐▐' : '▶';
  document.getElementById('pomo-dots').innerHTML = Array.from({ length: 4 }, (_, i) =>
    `<div class="pomo-dot${i < POMO.sessions ? ' done' : ''}"></div>`
  ).join('');
}

function pomoTick() {
  const rem = pomoCalcRemaining();
  if (rem <= 0) {
    POMO.remaining = 0;
    pomoAdvance();
  } else {
    pomoRender();
  }
}

function pomoAdvance() {
  clearInterval(POMO.interval);
  POMO.running = false;

  if (POMO.mode === 'focus') {
    POMO.sessions = (POMO.sessions + 1) % 4;
    POMO.mode = POMO.sessions === 0 ? 'long' : 'short';
  } else {
    POMO.mode = 'focus';
  }

  POMO.remaining = POMO.durations[POMO.mode];

  if (Notification.permission === 'granted') {
    const body = POMO.mode === 'focus' ? 'Break over — time to focus.' : 'Session done — take a break.';
    new Notification('Pomodoro', { body });
  }

  pomoRender();
}

function pomoToggle() {
  if (POMO.running) {
    // Pause — snapshot current remaining before stopping
    POMO.remaining = Math.ceil(pomoCalcRemaining());
    clearInterval(POMO.interval);
    POMO.running = false;
  } else {
    if (Notification.permission === 'default') Notification.requestPermission();
    POMO.startedAt = Date.now();
    POMO.startRemaining = POMO.remaining;
    POMO.running = true;
    // Poll every 500ms so we stay accurate even when throttled
    POMO.interval = setInterval(pomoTick, 500);
  }
  pomoRender();
}

function pomoReset() {
  clearInterval(POMO.interval);
  POMO.running = false;
  POMO.startedAt = null;
  POMO.remaining = POMO.durations[POMO.mode];
  pomoRender();
}

function pomoApplySettings() {
  const focus = Math.max(1, parseInt(document.getElementById('set-focus').value) || 25);
  const short = Math.max(1, parseInt(document.getElementById('set-short').value) || 5);
  const long  = Math.max(1, parseInt(document.getElementById('set-long').value) || 15);
  POMO.durations.focus = focus * 60;
  POMO.durations.short = short * 60;
  POMO.durations.long  = long * 60;
  localStorage.setItem('pomo-settings', JSON.stringify({ focus, short, long }));
  if (!POMO.running) {
    POMO.remaining = POMO.durations[POMO.mode];
    pomoRender();
  }
}

function pomoLoadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('pomo-settings'));
    if (!s) return;
    POMO.durations.focus = s.focus * 60;
    POMO.durations.short = s.short * 60;
    POMO.durations.long  = s.long  * 60;
    POMO.remaining = POMO.durations[POMO.mode];
    document.getElementById('set-focus').value = s.focus;
    document.getElementById('set-short').value = s.short;
    document.getElementById('set-long').value  = s.long;
  } catch (_) {}
}

document.getElementById('pomo-toggle').addEventListener('click', pomoToggle);
document.getElementById('pomo-reset').addEventListener('click', pomoReset);

document.getElementById('pomo-settings-btn').addEventListener('click', () => {
  const panel = document.getElementById('pomo-settings');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
});

['set-focus', 'set-short', 'set-long'].forEach(id => {
  document.getElementById(id).addEventListener('change', pomoApplySettings);
});

pomoLoadSettings();
pomoRender();

// ── Projects ──────────────────────────────────────────────────────

function renderProjectsPreview() {
  const el = document.getElementById('projects-preview');
  const projects = state.projects || [];
  if (projects.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="sep"></div>
    <div class="section-label projects-preview-label">Projects</div>
    ${projects.map(p => `
      <div class="project-preview-item${p.done ? ' done' : ''}">${esc(p.text)}</div>
    `).join('')}
  `;
  el.querySelectorAll('.projects-preview-label, .project-preview-item')
    .forEach(item => item.addEventListener('click', openProjects));
}

function renderWhy() {
  const el = document.getElementById('daily-why');
  const why = state.dailyWhy || '';
  el.textContent = why;
  el.style.display = why ? 'block' : 'none';
}

function renderProjects() {
  const list = document.getElementById('projects-list');
  const projects = state.projects || [];

  list.innerHTML = projects.length ? projects.map(p => `
    <div class="project-item${p.done ? ' done' : ''}" data-id="${esc(p.id)}">
      <div class="project-check">${CHECK_SVG}</div>
      <span class="project-text">${esc(p.text)}</span>
      <button class="btn-del" title="Remove" tabindex="-1">×</button>
    </div>
  `).join('') : `<p style="padding:24px;font-size:13px;color:var(--faint);text-align:center">No projects yet.<br>Add one below.</p>`;

  list.querySelectorAll('.project-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.btn-del')) return;
      const p = state.projects.find(x => x.id === el.dataset.id);
      if (p) { p.done = !p.done; save(); renderProjects(); renderProjectsPreview(); }
    });
    el.querySelector('.btn-del')?.addEventListener('click', () => {
      state.projects = state.projects.filter(x => x.id !== el.dataset.id);
      save(); renderProjects(); renderProjectsPreview();
    });
  });
}

function openProjects() {
  document.getElementById('projects-panel').classList.add('open');
  document.getElementById('projects-backdrop').classList.add('open');
  document.getElementById('projects-input').focus();
}

function closeProjects() {
  document.getElementById('projects-panel').classList.remove('open');
  document.getElementById('projects-backdrop').classList.remove('open');
}

document.getElementById('projects-trigger').addEventListener('click', openProjects);
document.getElementById('projects-close').addEventListener('click', closeProjects);
document.getElementById('projects-backdrop').addEventListener('click', closeProjects);

document.getElementById('projects-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val) return;
  if (!state.projects) state.projects = [];
  state.projects.push({ id: 'p' + Date.now(), text: val, done: false });
  save(); renderProjects(); renderProjectsPreview();
  e.target.value = '';
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeProjects();
});

// ─────────────────────────────────────────────────────────────────

document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val) return;
  if (!state.todos[TODAY]) state.todos[TODAY] = [];
  state.todos[TODAY].push({ id: 'u' + Date.now(), text: val, done: false });
  save();
  render();
  e.target.value = '';
  document.getElementById('add-input').focus();
});
</script>
